name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write       # needed to push the version commit and create the GitHub Release
  issues: write         # needed for semantic-release to comment on issues
  pull-requests: write  # needed for semantic-release to comment on PRs

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so semantic-release can read all commits
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Zip dist folder
        run: zip -r dist.zip dist/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
